<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCHU-DOG Official</title>
    <!-- 丸いフォントを追加 -->
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            font-family: 'Zen Maru Gothic', sans-serif; 
            background: #fff; 
            background-image: radial-gradient(#ececec 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .main-visual { display: flex; align-items: center; justify-content: center; gap: 60px; padding: 60px 20px; min-height: 80vh; }
        .text-area { max-width: 450px; }
        
        /* タイトルを丸っこく */
        h1 { font-size: 5rem; margin: 0; line-height: 1; color: #333; }
        
        /* 立ち絵のアニメーション設定 */
        .hero-img { 
            position: sticky; top: 80px; width: 450px; height: auto;
            /* ここからフェードスライドイン */
            animation: slideInRight 1.2s ease-out forwards;
        }

        @keyframes slideInRight {
            0% { opacity: 0; transform: translateX(50px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .profile-box { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 30px; 
            border-radius: 30px; /* 角を丸く */
            margin: 30px 0; 
            border-left: 6px solid #dcb56d; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .link-btn { 
            display: inline-block; padding: 12px 24px; background: #333; color: #fff; 
            text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s;
        }
        .link-btn:hover { transform: scale(1.05); }

        footer { position: fixed; bottom: 0; width: 100%; background: #dcb56d; color: #5e4a26; padding: 10px; text-align: center; font-size: 0.8rem; z-index: 100; }

        @media (max-width: 768px) {
            .main-visual { flex-direction: column; text-align: left; gap: 20px; padding-bottom: 120px; }
            h1 { font-size: 3rem; text-align: center; }
            .hero-img { position: static; width: 80vw; margin: 20px auto; }
            .profile-box { text-align: left; }
        }
    </style>
</head>
<body>

    <div class="main-visual">
        <div class="text-area">
            <h1>UCHU-DOG</h1>
            <div class="profile-box">
                <p><strong>🌟 Profile</strong></p>
                <ul style="padding-left: 20px; line-height: 2; list-style: none;">
                    <li>🎂 誕生日：X月X日</li>
                    <li>🐶 ファンネーム：〇〇〇〇</li>
                    <li>🚀 趣味：無重力散歩</li>
                    <li>📺 配信：IRIAMで毎日20時！</li>
                </ul>
            </div>
            <div class="links">
                <a href="#" class="link-btn">📺 IRIAM</a>
                <a href="#" class="link-btn">🐦 Twitter</a>
            </div>
        </div>
        <img src="images/space_uchuhikoushi_dog.png" alt="立ち絵" class="hero-img">
    </div>

    <footer>
        &copy; 2023 UCHU-DOG Official. | 管理者：〇〇〇〇
    </footer>

</body>
</html>
